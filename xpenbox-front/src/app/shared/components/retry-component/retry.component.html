<div class="flex items-center justify-center py-16">
    <div class="text-center">
        <div class="rounded-full flex items-center justify-center mx-auto mb-2">
            <app-icon-component [icon]="'search_off'" [size]="'8'" [class]="'text-neutral-400'"></app-icon-component>
        </div>
        <p class="text-neutral-600">{{ message() }}</p>
        <button type="button"
            (click)="sendRetry()" 
            class="inline-block text-[var(--xpb-primary)] rounded-lg font-medium transition-colors text-sm">
            Reintentar
        </button>
    </div>
</div>
