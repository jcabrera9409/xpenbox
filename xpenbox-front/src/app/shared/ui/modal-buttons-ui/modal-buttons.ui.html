<div class="border-t xpb-border p-2 mt-auto">
    <div class="flex gap-3">
        <button type="button"
            (click)="onCancel()"
            class="flex-1 xpb-btn-secondary inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-colors">
            <app-icon-component
                [icon]="cancelIcon()"
                [size]="'5'">
            </app-icon-component>
            <span>{{ cancelText() }}</span>
        </button>
        <button type="submit"
            (click)="onConfirm()"
            [attr.form]="formId()"
            [class]="'bg-[' + confirmColor() + ']'"
            class="flex-1 text-white inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="!isValidForm() || isLoading()">
            @if (!isLoading()) {
                <app-icon-component
                    [icon]="isEditMode() ? confirmEditIcon() : confirmIcon()"
                    [size]="'5'">
                </app-icon-component>
                <span>
                    @if (isEditMode()) {
                        {{ confirmEditText() }}
                    } @else {
                        {{ confirmText() }}
                    }
                </span>
            } @else {
                <app-icon-component
                    [icon]="loadingIcon()"
                    [size]="'5'"
                    [class]="'animate-spin'">
                </app-icon-component>
                <span>{{ loadingText() }}</span>
            }
        </button>
    </div>
</div>
